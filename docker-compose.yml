services:
  postgres:
    image: postgres:16-alpine
    container_name: karea_postgres
    environment:
      POSTGRES_USER: karea
      POSTGRES_PASSWORD: karea_secret
      POSTGRES_DB: karea
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init/00_extensions.sql:/docker-entrypoint-initdb.d/00_extensions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U karea -d karea"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: karea_backend
    ports:
      - "8080:8080"
    environment:
      APP_ENV: development
      PORT: "8080"
      DATABASE_URL: postgres://karea:karea_secret@postgres:5432/karea?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
